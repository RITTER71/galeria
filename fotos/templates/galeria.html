<!DOCTYPE html>
<html>

<head>
    <title>Mi Galería</title>
    <script src="https://cdn.tailwindcss.com"></script>



</head>

<body class="bg-gray-950 text-white">

    <h1 class="text-3xl text-center my-6">CIEEC</h1>

    <div class="max-w-6xl mx-auto columns-2 md:columns-4 gap-x-6 px-6 py-6 space-y-6">
        {% for foto in fotos %}

        <!-- CONTENEDOR -->
        <div class="relative group rounded-xl overflow-hidden">

            <!-- LINK -->
            <a href="#foto{{ foto.id }}" class="block">

                <!-- IMAGEN -->
                <img src="{{ foto.imagen.url }}" class="w-full rounded-xl shadow-lg 
                                transition duration-500 
                                group-hover:scale-110">

                <!-- OVERLAY -->
                <div class="absolute inset-0 bg-black/40 opacity-0 
                                group-hover:opacity-100 
                                transition duration-300 flex items-end">

                    <p class="text-white p-3 text-sm md:text-base">
                        {{ foto.titulo }}
                    </p>

                </div>

            </a>
        </div>

        <!-- MODAL (FUERA del grupo) -->
        <div id="foto{{ foto.id }}" class="fixed inset-0 bg-black/95 flex items-center justify-center 
                        opacity-0 pointer-events-none 
                        target:opacity-100 target:pointer-events-auto 
                        transition duration-300 z-[999]">

            <!-- Fondo clickeable -->
            <a href="#" class="absolute inset-0"></a>

            <!-- Contenido -->
            <div class="relative z-10 text-center">

                <img src="{{ foto.imagen.url }}" class="max-h-[95vh] max-w-[95vw] rounded-xl shadow-2xl">

                <p class="text-white mt-1 text-lg">
                    {{ foto.titulo }}
                </p>

            </div>

        </div>

        {% endfor %}
    </div>




</body>

</html>
